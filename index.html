<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestFret | Guitar Training Apps</title>
  <meta
    name="description"
    content="BestFret offers simple guitar training apps for chord changes, fretboard note learning, and TAB-based fretboard practice."
  />
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #5a5a5a;
      --line: #dcdcdc;
      --accent: #0b57d0;
      --panel: #f7f7f7;
      --button-text: #ffffff;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .button {
      padding: 10px 16px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    footer {
      margin-top: 40px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
      color: var(--muted);
    }

    .email-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .email-text {
      font-weight: 700;
      color: #000;
    }
  </style>
</head>
<body>

<div class="wrap">

  <h1>BestFret</h1>

  <p>Guitar training apps for structured practice.</p>

  <footer>
    <div>© 2026 BestFret</div>

    <div class="email-row">
      <span class="email-text" id="emailText">support@bestfret.com</span>
      <button class="button" onclick="copyEmail()">Copy Email</button>
    </div>

    <div>Built for practice. No ads. No subscriptions.</div>
  </footer>

</div>

<script>
function copyEmail() {
  const email = document.getElementById("emailText").innerText;
  navigator.clipboard.writeText(email);
  alert("Email copied: " + email);
}
</script>

</body>
</html>
